name: Build Java App, Upload JAR, Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: sample-java-maven-app
  AWS_REGION: eu-west-2
  S3_BUCKET: proxmox-krisdigitx-home-lab
  DOCKER_IMAGE: docker.io/krisdigitx/sample-java-maven-app

jobs:
  build-upload-push:
    name: Build Maven JAR, Upload to S3, Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR using Maven
        working-directory: app
        run: |
          mvn clean package
          ls -lh target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          aws s3 cp \
            app/target/sample-java-maven-app.jar \
            s3://${S3_BUCKET}/java-apps/${APP_NAME}/${{ steps.vars.outputs.image_tag }}/sample-java-maven-app.jar

          aws s3 cp \
            app/target/sample-java-maven-app.jar \
            s3://${S3_BUCKET}/java-apps/${APP_NAME}/latest/sample-java-maven-app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Update Kubernetes manifest image tag
        run: |
          sed -i "s|image: .*sample-java-maven-app:.*|image: ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }}|g" k8s/deployment.yaml
          grep "image:" k8s/deployment.yaml

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No manifest changes to commit"
          else
            git add k8s/deployment.yaml
            git commit -m "Update image tag to ${{ steps.vars.outputs.image_tag }}"
            git push
          fi